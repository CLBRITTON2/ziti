name: ZET Gate (artifact)

on:
  workflow_dispatch:

jobs:
  build-ziti:
    name: Build ziti (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: darwin
            arch: arm64
            runner: macos-15
          - os: windows
            arch: amd64
            runner: windows-2022
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Ziti CI
        uses: openziti/ziti-ci@v1

      - name: Build ziti
        shell: bash
        run: |
          mkdir -p "build/${{ matrix.arch }}/${{ matrix.os }}"
          $(go env GOPATH)/bin/ziti-ci generate-build-info common/version/info_generated.go version
          go build -o "build/${{ matrix.arch }}/${{ matrix.os }}/" ./ziti

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-release-${{ github.run_id }}
          path: build/

  zet-integration-gate:
    needs: build-ziti
    strategy:
      fail-fast: false
      matrix:
        zet: [v1.17.0, v1.17.1]    
    uses: CLBRITTON2/ziti-tunnel-sdk-c/.github/workflows/integration-tests.yml@integration-test-workflow
    with:
      ziti-artifact: release-${{ github.run_id }}
      label: ziti-release-gate-${{ matrix.zet }}
      zetA-version: ${{ matrix.zet }}
      tests-repo: CLBRITTON2/ziti-tunnel-sdk-c
