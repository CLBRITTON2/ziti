name: ZET Gate (version/ref)

on:
  workflow_dispatch:
    inputs:
      ziti_version:
        description: "Download this ziti release tag (blank = stable). Ignored when a ref is given below"
        required: false
        default: ""
      ziti_ref:
        description: "Build ziti from source at this branch/tag/commit"
        required: false
        default: ""
      zet1_version:
        description: "ZET release tag to test with (e.g. v1.17.1) or 'latest'"
        required: true

jobs:
  zet-integration-gate:
    uses: CLBRITTON2/ziti-tunnel-sdk-c/.github/workflows/integration-tests.yml@integration-test-workflow
    with:
      ziti-version: ${{ inputs.ziti_version }}
      ziti-ref: ${{ inputs.ziti_ref }}
      label: ziti-release-gate
      zet1-version: ${{ inputs.zet1_version }}
      tests-repo: CLBRITTON2/ziti-tunnel-sdk-c
